<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plex Notifier</title>

  <!-- PWA Configuration -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

  <!-- Theme colors -->
  <meta name="theme-color" content="#e5a00d" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#e5a00d" media="(prefers-color-scheme: dark)">

  <!-- Apple Touch Icons (iOS) -->
  <link rel="apple-touch-icon" sizes="152x152" href="{{ url_for('static', filename='icons/icon-152x152.png') }}">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">

  <!-- Standard favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='icons/icon-512x512.png') }}">

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Plex Notifier">

  <!-- Android/Chrome meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Plex Notifier">

  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .container { max-width: 600px; margin: auto; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.2rem; }
    input { width: 100%; padding: 0.5rem; }
    .btn { padding: 0.5rem 1rem; }
    .flash { background: #e0ffe0; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #0a0; }
  </style>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(registration) {
          console.log('ServiceWorker registration successful:', registration.scope);
        }, function(err) {
          console.log('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
