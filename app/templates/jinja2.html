<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Episodes Available</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; background-color: #fff; padding: 20px;">
  <h1 style="text-align: center;">{{ episodes|length }} New Episode{{ episodes|length > 1 and 's' or '' }} Available</h1>

  {% for ep in episodes %}
    <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
      <tr>
        <td width="160" valign="top" style="padding-right: 20px;">
          <img src="{{ ep.poster_url }}" alt="{{ ep.show_title }} poster" style="max-width: 150px; border-radius: 4px;" />
        </td>
        <td valign="top">
          <h2 style="margin: 0; font-size: 18px;">{{ ep.show_title }} S{{ "%02d"|format(ep.season) }}E{{ "%02d"|format(ep.episode) }}: {{ ep.ep_title }}</h2>
          <p style="margin: 10px 0;">{{ ep.synopsis }}</p>
        </td>
      </tr>
    </table>
  {% endfor %}
</body>
</html>
