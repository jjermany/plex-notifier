<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Episodes Available</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    h1 { text-align: center; }
    .episode { margin-bottom: 30px; }
    .episode img { max-width: 150px; float: left; margin-right: 20px; border-radius: 4px; }
    .details { overflow: hidden; }
    .details h2 { margin: 0 0 10px 0; font-size: 18px; }
    .details p { margin: 5px 0; }
    hr { border: none; border-top: 1px solid #eee; margin: 30px 0; }
  </style>
</head>
<body>
  <h1>{{ episodes|length }} New Episode{{ episodes|length > 1 and 's' or '' }} Available</h1>
  {% for ep in episodes %}
    <div class="episode">
      <img src="cid:{{ ep.cid }}" alt="{{ ep.show_title }} poster">
      <div class="details">
        <h2>{{ ep.show_title }} S{{ "%02d"|format(ep.season) }}E{{ "%02d"|format(ep.episode) }}: {{ ep.ep_title }}</h2>
        <p>{{ ep.synopsis }}</p>
      </div>
    </div>
    {% if not loop.last %}<hr>{% endif %}
  {% endfor %}
</body>
</html>
